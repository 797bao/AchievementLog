<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Achievement Log</title>
  <script type="text/javascript">
    // SPA deep-link shim (paired with public/404.html).
    // If we arrive here from 404.html with a `?/path` query, restore the real
    // path via history.replaceState BEFORE the React bundle loads so App.js's
    // initial read of window.location.pathname sees the correct route.
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>
  <style>
    @font-face {
      font-family: 'Virgil';
      src: url('%PUBLIC_URL%/fonts/Virgil.woff2') format('woff2');
      font-display: swap;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
