<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Achievement Log</title>
  <script type="text/javascript">
    // SPA deep-link shim for GitHub Pages.
    //
    // GitHub Pages serves 404.html when a path doesn't match a real file
    // (e.g. /AchievementLog/planner). We rewrite the URL to the root
    // /AchievementLog/?/planner and bounce back via window.location.replace.
    // index.html reads the `?/...` segment and restores the real path with
    // history.replaceState so the SPA mounts with the intended route.
    //
    // pathSegmentsToKeep = 1 because the app is served from /AchievementLog/.
    // If the repo is ever renamed or moved to a custom domain at the root,
    // drop this to 0.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
